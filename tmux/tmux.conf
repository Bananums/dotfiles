# Defaults

# Prefix: Ctrl+Space (easy to hit, doesn't conflict with anything)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Splits: | for vertical, - for horizontal, open in current directory
unbind '"'
unbind %
bind h split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"

# Pane navigation: Ctrl+h/j/k/l (no prefix needed, pairs with vim-tmux-navigator)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# New windows open in current directory
bind c new-window -c "#{pane_current_path}"

# Mouse support
set -g mouse on

# Vi copy mode
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Quality of life
set -g base-index 1          # windows start at 1, not 0
set -g pane-base-index 1     # panes too
set -sg escape-time 0        # no delay after Escape (important for nvim)
set -g focus-events on
set -g history-limit 10000

# True color support (needed for colorschemes in nvim)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:Tc"

# Status bar: Catppuccin Macchiato colors
set -g status-style "bg=#1e2030,fg=#cad3f5"
set -g status-left "#[bg=#8aadf4,fg=#1e2030,bold] #S #[default] "
set -g status-right "#[fg=#8aadf4] %H:%M #[fg=#cad3f5]%d-%b-%y "
set -g window-status-current-format "#[bg=#363a4f,fg=#8aadf4,bold] #I:#W "
set -g window-status-format "#[fg=#6e738d] #I:#W "
set -g status-left-length 20
